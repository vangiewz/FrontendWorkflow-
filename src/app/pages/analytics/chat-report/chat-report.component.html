<div class="min-h-screen flex bg-surface-950 font-sans">
  <app-sidebar [isMobile]="false" />

  <div class="flex-1 flex flex-col min-w-0 relative">
    <header class="h-16 border-b border-surface-800 bg-surface-900/50 backdrop-blur-sm flex items-center justify-between px-6 shrink-0 z-10 sticky top-0">
      <div class="flex items-center">
        <button routerLink="/paquetes/configuracion-ia" class="flex items-center justify-center p-2 text-gray-400 hover:text-white hover:bg-surface-800 rounded-full transition-colors" aria-label="Volver">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
      </div>
      <h2 class="text-lg font-semibold text-white tracking-wide truncate">Generador de Reportes IA</h2>
    </header>

    <!-- Mobile sidebar overlay -->
    @if (mobileSidebarOpen()) {
      <div class="fixed inset-0 z-50 lg:hidden" (click)="toggleMobileSidebar()">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"></div>
        <app-sidebar [isMobile]="true" (closeSidebar)="toggleMobileSidebar()" />
      </div>
    }

    <main class="flex-1 p-4 lg:p-8 overflow-hidden flex flex-col">
      <div class="chat-container flex-1 w-full max-w-5xl mx-auto flex flex-col">
        <div class="chat-header">
          <div class="header-info">
            <div class="ai-avatar">🤖</div>
            <div>
              <h2>Asistente de Reportes</h2>
              <p>Pide tu reporte usando lenguaje natural</p>
            </div>
          </div>
        </div>

        <div class="chat-messages flex-1" #scrollMe>
          <div *ngFor="let msg of messages" [ngClass]="{'message-row': true, 'user': msg.role === 'user', 'ia': msg.role === 'ia'}">
            <div class="message-bubble flex items-center justify-between">
              <div class="bubble-content" [innerHTML]="msg.content"></div>
              <ng-container *ngIf="msg.isPending">
                 <span class="text-xs opacity-50 ml-2" title="Pendiente de sincronizar">⏳</span>
              </ng-container>
            </div>
          </div>

          <div *ngIf="isLoading" class="message-row ia">
            <div class="message-bubble typing-indicator">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>

        <div class="chat-input-area shrink-0">
          <div class="input-wrapper">
            @if (networkStatus.isOffline()) {
              <div class="text-xs text-amber-400 mb-2 font-medium px-2 flex items-center gap-2">
                <span>⚠️</span>
                Modo offline: tu mensaje se procesará automáticamente al recuperar la conexión.
              </div>
            }
            <textarea 
              [(ngModel)]="userInput" 
              (keydown)="handleKeyDown($event)"
              placeholder="Ej. Hazme un Excel de los trámites PENDIENTES..."
              rows="1">
            </textarea>
            
            <button 
              class="mic-btn" 
              [ngClass]="{'listening': isListening}" 
              (click)="toggleListening()"
              title="Dictar por voz">
              <svg *ngIf="!isListening" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
              <svg *ngIf="isListening" class="pulse-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
            </button>

            <button 
              class="send-btn" 
              [disabled]="!userInput.trim() || isLoading" 
              (click)="sendMessage()">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
